<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | The Golden Razor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #121212; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; }
        h1 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 15px; text-align: left; }
        th { background-color: var(--gold); color: black; font-weight: bold; }
        tr:hover { background-color: #252525; }
        .btn-complete { background-color: #28a745; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-complete:hover { background-color: #218838; transform: scale(1.05); }
        #status-msg { margin-top: 20px; color: var(--gold); font-style: italic; }
    </style>
</head>
<body>

    <h1>💈 Appointment Management</h1>
    <div id="status-msg">Fetching latest bookings...</div>
    <div id="appointments-table"></div>

    <script>
        // Security Lock (Simple Cyber Defense)
        const password = prompt("Restricted Access. Enter Admin Password:");
        if (password !== "1234") { // Change "1234" to your preferred code
            alert("Unauthorized access.");
            document.body.innerHTML = "<h1 style='color:red;'>ACCESS DENIED</h1>";
            window.location.href = "index.html";
        }

        // Supabase Configuration
        const _supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

        async function fetchAppointments() {
            const { data, error } = await _supabase
                .from('appointments') 
                .select('*')
                .order('appointment_date', { ascending: true });

            if (error) {
                console.error('Error:', error);
                document.getElementById('status-msg').innerText = "Error loading data.";
                return;
            }

            if (data.length === 0) {
                document.getElementById('status-msg').innerText = "No pending appointments.";
                document.getElementById('appointments-table').innerHTML = "";
                return;
            }

            document.getElementById('status-msg').innerText = `Total Appointments: ${data.length}`;
            
            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Client Name</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Service</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(item => {
                tableHtml += `
                    <tr>
                        <td>${item.full_name}</td>
                        <td>${item.appointment_date}</td>
                        <td>${item.appointment_time}</td>
                        <td>${item.service_type}</td>
                        <td>
                            <button class="btn-complete" onclick="markAsDone('${item.id}')">DONE ✅</button>
                        </td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            document.getElementById('appointments-table').innerHTML = tableHtml;
        }

        async function markAsDone(id) {
            if(confirm("Mark this appointment as completed?")) {
                const { error } = await _supabase
                    .from('appointments')
                    .delete()
                    .eq('id', id);

                if (!error) fetchAppointments();
            }
        }

        // Initial Load
        fetchAppointments();
    </script>
</body>
</html>
